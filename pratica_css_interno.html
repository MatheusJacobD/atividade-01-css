<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>

<style>
	.card{
		width:500px; 
		height: fit-content; 
		background-color: aliceblue;  
		border: solid 2px navy; 
		margin: 20px; 
		padding: 40px;
	}

	.border {
		border-radius: 20px;
	}

	.profileCard{
		width: 100px; 
		height: 100px; 
	}

	.profileImg1{
		width: 100%;  
		height: 100%;
		background-image: url('https://cdn-icons-png.flaticon.com/512/706/706830.png');
		background-size: cover;
	}
	
	.profileImg2{
		width: 100%;  
		height: 100%;
		background-image: url('https://cdn-icons-png.flaticon.com/256/3681/3681928.png');
		background-size: cover;
	}

	.cardTitle{
		font-family: Arial, Helvetica, sans-serif; 
		font-size: 30px;
	}

	.cardMsg{
		font-family: Arial, Helvetica, sans-serif; 
	}

	.cardTitle{
		font-family: Arial, Helvetica, sans-serif;
		font-size: 30px;
	}

	.spanTitle{
		color: navy;
	}

	.spanMsg{
		color: navy;
		font-style:  italic;
	}

	p {
		font-size: 15px;
	}
	
</style>
</head>

<body>

	<div class="card border">

		<div class="profileCard border">
			<div class="profileImg1 border"></div>
		</div>

		<div>
			<h1 class="cardTitle">
				Meu nome é: <span class="spanTitle">Adriana</span>
			</h1>

			<p class="cardMsg">
				Mensagem: <span class="spanMsg">A vida não é um morango! E tá tudo bem!</span>
			</p>
		</div>
	</div>

	<div class="card border">

		<div class="profileCard border">
			<div class="profileImg2 border"></div>
		</div>

		<div>
			<h1 class="cardTitle">
				Meu nome é: <span class="spanTitle">Hugo</span>
			</h1>

			<p class="cardMsg">
				Mensagem: <span class="spanMsg">Um dia é da caça, o outro é do caçador.</span>
			</p>
		</div>
	</div>

</body>

</html>
